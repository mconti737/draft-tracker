<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oregon Football — Draft & Combine Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Oregon Brand Tokens ── */
:root {
  --green:      #007030;
  --yellow:     #FEE11A;
  --bg:         #060a06;
  --surface:    #0d130d;
  --surface2:   #111a11;
  --border:     rgba(0,112,48,0.18);
  --text:       #edeae2;
  --text-muted: rgba(237,234,226,0.38);
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { height:100%; }

body {
  min-height:100vh;
  background:var(--bg);
  font-family:'Georgia',serif;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  overflow-x:hidden;
  position:relative;
}

/* ── Atmospheric background ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(0,112,48,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 35% at 15% 95%,  rgba(0,112,48,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 90%,  rgba(254,225,26,0.04) 0%, transparent 55%);
  pointer-events:none; z-index:0;
}

/* Subtle field-stripe texture */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 59px,
    rgba(0,112,48,0.025) 59px, rgba(0,112,48,0.025) 60px
  );
  pointer-events:none; z-index:0;
}

/* ── Card ── */
.card {
  position:relative; z-index:1;
  width:100%; max-width:460px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:3px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.5),
    0 1px 0 0 rgba(254,225,26,0.35),
    0 48px 96px rgba(0,0,0,0.7);
  overflow:hidden;
  animation:rise 0.55s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes rise {
  from { opacity:0; transform:translateY(20px) scale(0.985); }
  to   { opacity:1; transform:translateY(0)    scale(1); }
}

/* ── Header band ── */
.header {
  background: linear-gradient(160deg, #0a1a0a 0%, #061206 100%);
  border-bottom: 1px solid rgba(0,112,48,0.25);
  padding: 32px 36px 26px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  position:relative;
  overflow:hidden;
}

/* Yellow top accent line */
.header::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background: linear-gradient(90deg, transparent, var(--yellow) 30%, var(--yellow) 70%, transparent);
}

/* Faint O watermark */
.header::after {
  content:'O';
  position:absolute;
  font-size:260px;
  font-weight:900;
  color:rgba(0,112,48,0.045);
  top:-40px; right:-30px;
  line-height:1;
  pointer-events:none;
  font-family:'Georgia',serif;
  letter-spacing:-0.05em;
}

.logo-wrap {
  width:88px; height:88px;
  border-radius:50%;
  background:#fff;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
  border:2px solid rgba(254,225,26,0.4);
  box-shadow: 0 0 0 4px rgba(0,112,48,0.2), 0 8px 24px rgba(0,0,0,0.4);
  flex-shrink:0;
  position:relative; z-index:1;
}

.logo-wrap img {
  width:86%; height:86%;
  object-fit:contain;
}

.school-name {
  font-family:'Georgia',serif;
  font-size:11px;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--yellow);
  text-align:center;
  position:relative; z-index:1;
}

.app-subtitle {
  font-family:'Courier New',monospace;
  font-size:9.5px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(237,234,226,0.28);
  text-align:center;
  position:relative; z-index:1;
}

/* ── Body ── */
.body { padding:34px 36px 30px; }

/* ── Field label ── */
.lbl {
  display:block;
  font-family:'Courier New',monospace;
  font-size:9px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--text-muted);
  margin-bottom:8px;
}

/* ── Inputs ── */
.field { position:relative; margin-bottom:14px; }

input[type=password], select {
  width:100%;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(0,112,48,0.25);
  border-radius:2px;
  color:var(--text);
  font-family:'Courier New',monospace;
  font-size:14px;
  padding:13px 42px 13px 14px;
  outline:none;
  appearance:none;
  transition:border-color 0.2s, background 0.2s, box-shadow 0.2s;
}

input[type=password]:focus, select:focus {
  border-color:rgba(0,112,48,0.7);
  background:rgba(0,112,48,0.05);
  box-shadow:0 0 0 3px rgba(0,112,48,0.12);
}

input[type=password]::placeholder { color:rgba(237,234,226,0.18); }
select option { background:#0d130d; }

.ico {
  position:absolute; right:13px; top:50%;
  transform:translateY(-50%);
  color:rgba(237,234,226,0.2);
  font-size:11px;
  pointer-events:none;
}

/* ── Error ── */
.err {
  font-family:'Courier New',monospace;
  font-size:10px;
  color:#e05050;
  margin-top:5px;
  min-height:15px;
  display:block;
  letter-spacing:0.04em;
}

/* ── Buttons ── */
.btn-main {
  width:100%;
  padding:14px 20px;
  background:var(--green);
  color:#fff;
  border:none; border-radius:2px;
  font-family:'Georgia',serif;
  font-size:13px; font-weight:bold;
  letter-spacing:0.16em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.18s;
  display:flex; align-items:center; justify-content:center; gap:10px;
  margin-top:8px;
  position:relative; overflow:hidden;
}

.btn-main::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.12) 50%, transparent 65%);
  transform:translateX(-100%);
  transition:transform 0.5s;
}
.btn-main:hover::after { transform:translateX(100%); }
.btn-main:hover { background:#008a3a; transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,112,48,0.4); }
.btn-main:active { transform:translateY(0); }
.btn-main:disabled {
  background:rgba(0,112,48,0.18);
  color:rgba(237,234,226,0.2);
  cursor:not-allowed; transform:none; box-shadow:none;
}
.btn-main:disabled::after { display:none; }

.btn-dl {
  width:100%;
  padding:14px 20px;
  background:transparent;
  color:var(--yellow);
  border:1px solid rgba(254,225,26,0.5);
  border-radius:2px;
  font-family:'Georgia',serif;
  font-size:13px; font-weight:bold;
  letter-spacing:0.16em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.18s;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.btn-dl:hover {
  background:rgba(254,225,26,0.07);
  border-color:var(--yellow);
  box-shadow:0 0 28px rgba(254,225,26,0.14);
}

.btn-ghost {
  width:100%;
  padding:10px 20px;
  background:transparent;
  color:var(--text-muted);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:2px;
  font-family:'Courier New',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.18s;
  margin-top:10px;
  display:block;
}
.btn-ghost:hover { border-color:rgba(255,255,255,0.15); color:rgba(237,234,226,0.65); }

/* ── Progress ── */
.prog-track {
  height:2px;
  background:rgba(255,255,255,0.06);
  border-radius:1px;
  margin-bottom:22px;
  overflow:visible;
  position:relative;
}
.prog-fill {
  height:100%;
  background:linear-gradient(90deg, var(--green), #00c455);
  border-radius:1px;
  transition:width 0.35s ease;
  position:relative;
}
.prog-fill::after {
  content:'';
  position:absolute; right:-4px; top:-3px;
  width:8px; height:8px; border-radius:50%;
  background:#00c455;
  box-shadow:0 0 10px #00c455;
}

.steps { list-style:none; display:flex; flex-direction:column; gap:9px; }
.step {
  display:flex; align-items:center; gap:10px;
  font-family:'Courier New',monospace;
  font-size:10px; letter-spacing:0.06em;
  color:rgba(237,234,226,0.22);
  transition:color 0.2s;
}
.step.active { color:rgba(237,234,226,0.88); }
.step.done  { color:rgba(0,196,85,0.8); }

.step-dot {
  width:6px; height:6px; border-radius:50%;
  border:1px solid currentColor; flex-shrink:0;
  transition:background 0.2s;
}
.step.done .step-dot { background:currentColor; }

@keyframes pdot {
  0%,100% { transform:scale(1); opacity:1; }
  50%      { transform:scale(1.5); opacity:0.6; }
}
.step.active .step-dot { animation:pdot 1s ease-in-out infinite; }

/* ── Stats ── */
.stats {
  padding:11px 15px;
  background:rgba(0,112,48,0.07);
  border:1px solid rgba(0,112,48,0.2);
  border-radius:2px;
  margin-bottom:14px;
  font-family:'Courier New',monospace;
  font-size:10px;
  color:rgba(0,196,85,0.85);
  line-height:1.85;
  letter-spacing:0.04em;
}

/* ── Footer ── */
.footer {
  padding:12px 36px;
  background:rgba(0,0,0,0.25);
  border-top:1px solid rgba(0,112,48,0.12);
  display:flex; justify-content:space-between; align-items:center;
}
.f-status {
  font-family:'Courier New',monospace;
  font-size:9px; letter-spacing:0.14em; text-transform:uppercase;
  color:rgba(237,234,226,0.18);
  display:flex; align-items:center; gap:6px;
}
.pip {
  width:4px; height:4px; border-radius:50%;
  background:var(--green); opacity:0.5;
}
@keyframes ppip {
  0%,100% { opacity:0.5; }
  50%      { opacity:1; box-shadow:0 0 6px var(--green); }
}
.pip.on { animation:ppip 1.3s ease-in-out infinite; }
.f-yr {
  font-family:'Georgia',serif;
  font-size:10px; letter-spacing:0.1em;
  color:rgba(254,225,26,0.45);
}

/* ── Panels ── */
.panel { display:none; }
.panel.show { display:block; }

/* ── Shake ── */
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%      { transform:translateX(-7px); }
  40%      { transform:translateX(7px); }
  60%      { transform:translateX(-4px); }
  80%      { transform:translateX(4px); }
}
.shake { animation:shake 0.38s ease; }
</style>
</head>

let ALL_DATA   = null;

// ── Panels ──────────────────────────────────────────────────────
function show(id) {
  ['p-auth','p-select','p-prog','p-done'].forEach(p =>
    document.getElementById(p).classList.remove('show'));
  document.getElementById(id).classList.add('show');
}

// ── Auth ─────────────────────────────────────────────────────────
function auth() {
  const val = document.getElementById('pw').value;
  if (val === PW) {
    document.getElementById('pw-err').textContent = ' ';
    setSt('READY'); pip(false);
    show('p-select');
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password. Try again.';
    const el = document.getElementById('pw');
    el.classList.add('shake');
    el.value = '';
    setTimeout(() => el.classList.remove('shake'), 400);
    el.focus();
  }
}

// ── Year ─────────────────────────────────────────────────────────
function onYr() {
  const yr = document.getElementById('yr-sel').value;
  document.getElementById('gen-btn').disabled = !yr;
  document.getElementById('f-yr').textContent = yr ? yr + ' DRAFT' : '';
}

// ── Helpers ──────────────────────────────────────────────────────
function setSt(t) { document.getElementById('st-txt').textContent = t; }
function pip(on) { document.getElementById('pip').className = 'pip' + (on ? ' on' : ''); }
function setP(n) { document.getElementById('prog').style.width = n + '%'; }
function step(id, s) { document.getElementById(id).className = 'step ' + s; }
function tick() { return new Promise(r => setTimeout(r, 80)); }

function resetSel() {
  document.getElementById('yr-sel').value = '';
  document.getElementById('gen-btn').disabled = true;
  document.getElementById('f-yr').textContent = '';
  setSt('READY'); pip(false);
  show('p-select');
}

// ── Data loader ───────────────────────────────────────────────────
async function loadData() {
  if (ALL_DATA) return ALL_DATA;
  const bin = atob(DATA_B64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const w = ds.writable.getWriter(), r = ds.readable.getReader();
  w.write(bytes); w.close();
  const chunks = [];
  while (true) { const {done,value} = await r.read(); if (done) break; chunks.push(value); }
  let tot = 0; chunks.forEach(c => tot += c.length);
  const out = new Uint8Array(tot); let off = 0;
  chunks.forEach(c => { out.set(c, off); off += c.length; });
  ALL_DATA = JSON.parse(new TextDecoder().decode(out));
  return ALL_DATA;
}

// ── XLSX ─────────────────────────────────────────────────────────
function fmtHt(n) {
  if (!n && n !== 0) return '';
  const f = Math.floor(n/12), r = (n - f*12).toFixed(3);
  return f + "'" + r + '"';
}
function v(x) { return (x !== null && x !== undefined) ? x : ''; }

function buildXlsx(data) {
  const wb = XLSX.utils.book_new();
  const year = data.year, picks = data.draft_picks || [], cs = data.combine_summary || {};
  const avgPos = cs.avg_by_position || {};

  const HDR = ['TEAM','ROUND','PICK','POSITION','NAME','HS STATE','COLLEGE',
               'HT','WT','HAND','ARM','WING','40','VERT','BROAD','SHUT','CONE','CONF','STARS'];
  const WID = [6,7,6,10,24,7,30,9,6,7,7,7,7,7,7,7,7,10,7];

  function pr(p, ex) {
    const r = [v(p.team),v(p.round),v(p.pick),v(p.position),v(p.name),
      v(p.hs_state),v(p.college),fmtHt(p.height_inches),v(p.weight),
      v(p.hand),v(p.arm),v(p.wingspan),v(p.forty),v(p.vertical),v(p.broad),
      v(p.shuttle),v(p.cone),v(p.conference),p.recruiting_stars??''];
    if(ex) ex.forEach(x=>r.push(x)); return r;
  }

  function sht(name,title,hdrs,rows,wids) {
    const ws = XLSX.utils.aoa_to_sheet([[title],hdrs,...rows]);
    ws['!cols'] = (wids||hdrs.map(()=>12)).map(w=>({'wch':w}));
    XLSX.utils.book_append_sheet(wb,ws,name);
  }

  const WC = new Set(['CA','OR','WA','NV','AZ','UT','ID','HI','AK']);
  const PM = {QB:['QB'],RB:['RB','FB'],WR:['WR'],TE:['TE'],
    OL:['OT','OG','OC','IOL','G','C'],DT:['DT','NT'],
    EDGE:['EDGE','DE'],LB:['LB','ILB','OLB','MLB'],
    SAF:['SAF','SS','FS'],CB:['CB','DB']};

  // NOTES
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
    [year+' NFL DRAFT — FINDINGS'],[],
    ['STAT','VALUE'],['Total Picks',picks.length],
    ['Round 1 Picks',picks.filter(p=>p.round===1).length],
    ['Transfers',picks.filter(p=>p.is_transfer).length],
    ['Early Entrants',picks.filter(p=>p.is_early_entrant).length],
    ['With 40-Yard Dash',picks.filter(p=>p.forty).length],
    ['West Coast HS',picks.filter(p=>WC.has(p.hs_state)).length],
  ]), 'NOTES');

  sht('DRAFT TRACKER','DRAFT SELECTIONS',HDR,picks.map(p=>pr(p)),WID);

  sht('Transfers (Not Juco)','DRAFT SELECTIONS — TRANSFERS',
    [...HDR,'TRANSFER?'],picks.filter(p=>p.is_transfer).map(p=>pr(p,['Y'])),
    [...WID,10]);

  [[1,[1]],[2,[2,3]],[3,[4,5,6,7]]].forEach(([day,rds]) =>
    sht('DAY '+day+' SUMMARY','DRAFT SELECTIONS — DAY '+day,
      HDR,picks.filter(p=>rds.includes(p.round)).map(p=>pr(p)),WID));

  sht('State Study','DRAFT SELECTIONS — STATE STUDY',HDR,picks.map(p=>pr(p)),WID);

  sht('WEST COAST','WEST COAST SELECTIONS',[...HDR,'TRANSFER?'],
    picks.filter(p=>WC.has(p.hs_state)||p.is_west_coast).map(p=>pr(p,[p.is_transfer?'Y':''])),
    [...WID,10]);

  sht('EARLY ENTRANTS','EARLY ENTRANTS — TRUE JUNIORS',[...HDR,'TRANSFER?','EARLY?'],
    picks.filter(p=>p.is_early_entrant).map(p=>pr(p,[p.is_transfer?'Y':'','Y'])),
    [...WID,10,8]);

  // BREAKDOWN FINAL
  const bS={},bC={},bP={};
  picks.forEach(p => {
    const r=Math.min(p.round||1,7),init=()=>[0,0,0,0,0,0,0,0];
    const st=p.hs_state||'UNK',cf=p.conference||'UNK',ps=p.position||'UNK';
    if(!bS[st])bS[st]=init(); if(!bC[cf])bC[cf]=init(); if(!bP[ps])bP[ps]=init();
    bS[st][0]++;bS[st][r]++; bC[cf][0]++;bC[cf][r]++; bP[ps][0]++;bP[ps][r]++;
  });
  const sts=Object.keys(bS).sort(),cfs=Object.keys(bC).sort(),pss=Object.keys(bP).sort();
  const fmt=(o,k)=>o?[k,...o.slice(0,8)]:Array(9).fill('');
  const maxR=Math.max(sts.length,cfs.length,pss.length);
  const bkR=[['BREAKDOWNS'],
    ['BY HS STATE','','','','','','','','','','BY CONFERENCE','','','','','','','','','','BY POSITION'],
    ['','TOTAL','R1','R2','R3','R4','R5','R6','R7','','','TOTAL','R1','R2','R3','R4','R5','R6','R7','','','TOTAL','R1','R2','R3','R4','R5','R6','R7']];
  for(let i=0;i<maxR;i++) bkR.push([...fmt(bS[sts[i]],sts[i]),'', ...fmt(bC[cfs[i]],cfs[i]),'', ...fmt(bP[pss[i]],pss[i])]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(bkR),'BREAKDOWN FINAL');

  // COMBINE SUMMARY
  const cE=Object.entries(cs.by_conference||{});
  const pO=['QB','RB','WR','TE','OL','DT','EDGE','LB','CB','SAF'];
  const cR=[[year+' NFL COMBINE SUMMARY'],[],
    ['Participants by Conference','','','','','Avg Measurements by Position'],
    ['','',cs.total_participants||'','','','POS','HT','WT','40','VERT','BROAD','SHUT','CONE']];
  pO.forEach((pos,i)=>{
    const [cn,cc]=cE[i]||['',''];const a=avgPos[pos]||{};
    cR.push([cn,'',cc||'','','',pos,fmtHt(a.ht)||'',v(a.wt),v(a.forty),v(a.vertical),v(a.broad),v(a.shuttle),v(a.cone)]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(cR),'COMBINE SUMMARY');

  const PT={QB:'QUARTERBACKS',RB:'RUNNING BACKS',WR:'WIDE RECEIVERS',TE:'TIGHT ENDS',
    OL:'OFFENSIVE LINE',DT:'DEFENSIVE TACKLES',EDGE:'EDGE RUSHERS',LB:'LINEBACKERS',
    SAF:'SAFETIES',CB:'CORNERBACKS'};
  Object.entries(PM).forEach(([sn,pl]) =>
    sht(sn,PT[sn]||sn,[...HDR,'TRANSFER?','EARLY?'],
      picks.filter(p=>pl.includes(p.position)).map(p=>pr(p,[p.is_transfer?'Y':'',p.is_early_entrant?'Y':''])),
      [...WID,10,8]));

  sht('SPEC','SPECIALISTS',HDR,picks.filter(p=>['K','P','LS'].includes(p.position)).map(p=>pr(p)),WID);

  const aR=[[year+' COMBINE — AVERAGE MEASUREMENTS'],['POS','HT','WT','40','VERT','BROAD','SHUT','CONE']];
  pO.forEach(pos=>{ const a=avgPos[pos]||{};
    aR.push([pos,fmtHt(a.ht)||'',v(a.wt),v(a.forty),v(a.vertical),v(a.broad),v(a.shuttle),v(a.cone)]); });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(aR),'AVG MEASUREMENTS');

  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['BREAKDOWNS'],['See BREAKDOWN FINAL']]),'BREAKDOWNS');

  const wcP=picks.filter(p=>WC.has(p.hs_state)),caP=picks.filter(p=>p.hs_state==='CA');
  const wAoa=[['CA PLAYERS','TEAM','POS','','WEST COAST PLAYERS','STATE','TEAM','POS']];
  const mWC=Math.max(caP.length,wcP.length,1);
  for(let i=0;i<mWC;i++) wAoa.push([caP[i]?.name||'',caP[i]?.team||'',caP[i]?.position||'','',
    wcP[i]?.name||'',wcP[i]?.hs_state||'',wcP[i]?.team||'',wcP[i]?.position||'']);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(wAoa),'WCTX HS');

  return wb;
}

// ── Generate ──────────────────────────────────────────────────────
async function generate() {
  const year = parseInt(document.getElementById('yr-sel').value);
  if (!year) return;

  show('p-prog'); setSt('GENERATING'); pip(true);
  setP(0); ['s1','s2','s3','s4'].forEach(s => step(s,''));
  await tick();

  try {
    step('s1','active'); setP(10);
    const all = await loadData();
    const data = all[year];
    if (!data) {
      alert('Data for '+year+' not yet available.\nRun scrape.py then update_data.py to add this year.');
      resetSel(); return;
    }
    step('s1','done'); setP(30); await tick();

    step('s2','active'); setP(50); await tick();
    const wb = buildXlsx(data);
    step('s2','done'); setP(65); await tick();

    step('s3','active'); setP(80); await tick();
    step('s3','done');

    step('s4','active'); setP(92); await tick();
    const out  = XLSX.write(wb, {bookType:'xlsx', type:'array'});
    const blob = new Blob([out], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url  = URL.createObjectURL(blob);
    const fname = 'Oregon_Draft_Tracker_' + year + '.xlsx';
    step('s4','done'); setP(100);

    document.getElementById('dl-btn').onclick = () => {
      const a = document.createElement('a'); a.href=url; a.download=fname; a.click();
    };

    const p = data.draft_picks||[];
    document.getElementById('stats').innerHTML =
      '✓ &nbsp;'+p.length+' picks &nbsp;·&nbsp; '+
      p.filter(x=>x.forty).length+' combine times &nbsp;·&nbsp; '+
      p.filter(x=>x.is_transfer).length+' transfers &nbsp;·&nbsp; '+
      p.filter(x=>x.is_early_entrant).length+' early entrants';

    document.getElementById('f-yr').textContent = year+' DRAFT';
    setSt('READY'); pip(false);
    show('p-done');

  } catch(e) {
    alert('Error: '+e.message); resetSel();
  }
}

// init
document.getElementById('pw').focus();
</script>
